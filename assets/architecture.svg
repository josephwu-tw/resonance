<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="700" fill="#f8f9fa" rx="12"/>

  <!-- ── Subgraph: Agentic Layer ── -->
  <rect x="30" y="120" width="260" height="300" rx="10" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="160" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c6fad">Agentic Layer — Claude</text>

  <!-- ── Subgraph: RAG Layer ── -->
  <rect x="320" y="120" width="260" height="300" rx="10" fill="#edf7ed" stroke="#4caf50" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="450" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Retrieval Layer — RAG</text>

  <!-- ── Subgraph: Scoring Engine ── -->
  <rect x="610" y="120" width="260" height="300" rx="10" fill="#fef6e4" stroke="#f5a623" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="740" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">Scoring Engine — Mini Project Core</text>

  <!-- ══ USER INPUT ══ -->
  <rect x="340" y="20" width="220" height="60" rx="8" fill="#4a90d9" stroke="#2c6fad" stroke-width="1.5"/>
  <text x="450" y="44" text-anchor="middle" font-size="13" font-weight="bold" fill="white">User</text>
  <text x="450" y="62" text-anchor="middle" font-size="10" fill="#d6eaff">natural language query or preferences</text>

  <!-- ── Intent Parser ── -->
  <rect x="55" y="165" width="210" height="65" rx="8" fill="white" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="160" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c6fad">Intent Parser</text>
  <text x="160" y="204" text-anchor="middle" font-size="10" fill="#555">Extract genre · mood · energy</text>
  <text x="160" y="218" text-anchor="middle" font-size="10" fill="#555">from natural language</text>

  <!-- ── User Profile Builder ── -->
  <rect x="55" y="265" width="210" height="55" rx="8" fill="white" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="160" y="288" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c6fad">User Profile Builder</text>
  <text x="160" y="306" text-anchor="middle" font-size="10" fill="#555">Structured preference dict</text>

  <!-- ── Explanation Generator ── -->
  <rect x="55" y="355" width="210" height="55" rx="8" fill="white" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="160" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c6fad">Explanation Generator</text>
  <text x="160" y="396" text-anchor="middle" font-size="10" fill="#555">Why these songs were chosen</text>

  <!-- ── songs.csv Catalog ── -->
  <rect x="345" y="165" width="210" height="55" rx="8" fill="white" stroke="#4caf50" stroke-width="1.5"/>
  <text x="450" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">songs.csv Catalog</text>
  <text x="450" y="206" text-anchor="middle" font-size="10" fill="#555">Song features &amp; metadata</text>

  <!-- ── Vector Embeddings ── -->
  <rect x="345" y="255" width="210" height="65" rx="8" fill="white" stroke="#4caf50" stroke-width="1.5"/>
  <text x="450" y="278" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Vector Embeddings</text>
  <text x="450" y="294" text-anchor="middle" font-size="10" fill="#555">Semantic similarity index</text>
  <text x="450" y="310" text-anchor="middle" font-size="10" fill="#555">(Claude / sentence-transformers)</text>

  <!-- ── Candidate Songs ── -->
  <rect x="345" y="355" width="210" height="55" rx="8" fill="white" stroke="#4caf50" stroke-width="1.5"/>
  <text x="450" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Top-N Candidate Songs</text>
  <text x="450" y="396" text-anchor="middle" font-size="10" fill="#555">Semantic retrieval results</text>

  <!-- ── Weighted Scorer ── -->
  <rect x="635" y="165" width="210" height="65" rx="8" fill="white" stroke="#f5a623" stroke-width="1.5"/>
  <text x="740" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">Weighted Scorer</text>
  <text x="740" y="204" text-anchor="middle" font-size="10" fill="#555">genre · mood · energy · tags</text>
  <text x="740" y="218" text-anchor="middle" font-size="10" fill="#555">popularity · decade · acousticness</text>

  <!-- ── Scoring Mode ── -->
  <rect x="635" y="265" width="210" height="65" rx="8" fill="white" stroke="#f5a623" stroke-width="1.5"/>
  <text x="740" y="288" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">Scoring Mode</text>
  <text x="740" y="304" text-anchor="middle" font-size="10" fill="#555">balanced / genre_first</text>
  <text x="740" y="320" text-anchor="middle" font-size="10" fill="#555">mood_first / energy_focused</text>

  <!-- ── Diversity Re-ranker ── -->
  <rect x="635" y="355" width="210" height="55" rx="8" fill="white" stroke="#f5a623" stroke-width="1.5"/>
  <text x="740" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">Diversity Re-ranker</text>
  <text x="740" y="396" text-anchor="middle" font-size="10" fill="#555">Artist &amp; genre penalty</text>

  <!-- ══ OUTPUT ══ -->
  <rect x="340" y="590" width="220" height="70" rx="8" fill="#5c4fcb" stroke="#3d32a8" stroke-width="1.5"/>
  <text x="450" y="614" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Top-K Recommendations</text>
  <text x="450" y="632" text-anchor="middle" font-size="10" fill="#ccc8f8">+ natural language explanation</text>
  <text x="450" y="648" text-anchor="middle" font-size="10" fill="#ccc8f8">+ score breakdown</text>

  <!-- ════ ARROWS ════ -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#666"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4caf50"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f5a623"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5c4fcb"/>
    </marker>
  </defs>

  <!-- User → Intent Parser (down-left) -->
  <path d="M 390,80 L 200,165" fill="none" stroke="#4a90d9" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- User → songs.csv (down) -->
  <path d="M 450,80 L 450,165" fill="none" stroke="#4caf50" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- Intent Parser → User Profile Builder -->
  <path d="M 160,230 L 160,265" fill="none" stroke="#4a90d9" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- User Profile Builder → Explanation Generator -->
  <path d="M 160,320 L 160,355" fill="none" stroke="#4a90d9" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- User Profile Builder → Vector Embeddings (cross-subgraph) -->
  <path d="M 265,292 L 345,285" fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- songs.csv → Vector Embeddings -->
  <path d="M 450,220 L 450,255" fill="none" stroke="#4caf50" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- Vector Embeddings → Candidate Songs -->
  <path d="M 450,320 L 450,355" fill="none" stroke="#4caf50" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- Candidate Songs → Weighted Scorer (cross-subgraph) -->
  <path d="M 555,382 L 635,210" fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Weighted Scorer → Scoring Mode -->
  <path d="M 740,230 L 740,265" fill="none" stroke="#f5a623" stroke-width="1.8" marker-end="url(#arrow-orange)"/>

  <!-- Scoring Mode → Diversity Re-ranker -->
  <path d="M 740,330 L 740,355" fill="none" stroke="#f5a623" stroke-width="1.8" marker-end="url(#arrow-orange)"/>

  <!-- Diversity Re-ranker → Explanation Generator (cross-subgraph, curved) -->
  <path d="M 635,382 C 500,450 300,460 265,382" fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Explanation Generator → Output -->
  <path d="M 160,410 C 160,530 340,590 340,608" fill="none" stroke="#5c4fcb" stroke-width="1.8" marker-end="url(#arrow-purple)"/>

  <!-- Diversity Re-ranker → Output -->
  <path d="M 740,410 C 740,530 560,590 560,608" fill="none" stroke="#5c4fcb" stroke-width="1.8" marker-end="url(#arrow-purple)"/>

  <!-- Output → User (feedback loop, dashed) -->
  <path d="M 450,660 C 450,690 820,690 820,350 C 820,50 620,20 560,20" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="835" y="350" text-anchor="middle" font-size="10" fill="#999" transform="rotate(90,835,350)">feedback loop</text>

  <!-- ── Title ── -->
  <text x="450" y="685" text-anchor="middle" font-size="11" fill="#aaa">Resonance — Agentic Music Recommendation System  |  CodePath AI110 Final Project</text>

</svg>
